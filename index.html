      ["选一部周末晚上想看的电影，你更倾向于？", ["逻辑严密的烧脑悬疑片", "情感细腻的浪漫文艺片", "充满时代气息的传记或纪录片", "视听震撼的科幻或暗黑题材"]],
      ["闭上眼睛触摸一件物品，你最偏爱哪种触感？", ["光滑冰冷的大理石或金属", "柔软亲肤的丝绒或羊毛", "带有岁月包浆的原木或粗陶", "坚硬尖锐的晶体或异形合成材料"]],
      ["让你感到最放松的背景音是？", ["规律滴答的钟声或克制的白噪音", "缓慢流淌的轻音乐或抒情曲", "市井街头的嘈杂或自然风雨声", "带有迷幻感的电子合成器节奏"]],
      ["去一个陌生的城市旅行，你最想去哪里？", ["欣赏现代主义建筑与规整的街道", "没有目的地漫步，用心感受氛围", "去二手市场或老城区感受烟火气", "寻找最先锋的地下展览或废墟探险"]],
      ["如果你要写一个故事，它的基调大概率会是？", ["冷静客观，抽丝剥茧的叙述", "细腻动人，聚焦人物内心的波动", "记录平凡小人物的真实一生", "充满黑色幽默的狂想曲"]],
      ["你最常做的一类梦是？", ["在某个迷宫里寻找出口或规律", "在天空中飞行或与水流融为一体", "回到小时候或某个特定的老地方", "梦见极其离谱、甚至非自然的怪物"]],
      ["拿起相机，你最想记录下什么画面？", ["光影切割出的利落几何线条", "人物转瞬即逝的一个微妙神态", "斑驳的墙面与带有痕迹的老物件", "夜幕下充满赛博感的霓虹街景"]],
      ["日常穿搭中，你个人最看重哪一点？", ["剪裁得体，版型干净利落", "材质柔软，有垂坠感和飘逸感", "耐穿舒适，带有水洗做旧的质感", "设计低调，暗色系"]],
      ["哪种情况会让你感到最为烦躁？", ["计划被打乱，失去对事物的控制感", "感觉被冷漠对待，没有情感交流", "被都市规则压抑，无法展示真实自我", "生活一成不变，极度无聊且缺乏刺激"]],
      ["你最希望听到别人怎么评价你的作品？", ["结构严密，经得起反复推敲", "感染力极强，让人瞬间产生共鸣", "非常有生命力，真实且厚重", "脑洞太大了，从来没见过这种"]],
      ["想象你走进一片森林，你最先关注的是？", ["树木排列的间距和阳光穿透的角度", "风吹过树叶的沙沙声和潮湿的空气", "脚下长满青苔的石头和腐朽的树根", "那些长得奇形怪状、阴森的植物"]],
      ["看到一面被涂鸦得乱七八糟的墙，你心想？", ["如果能重新规划排版一下就好了", "能感受到涂鸦者当时宣泄的情绪", "这是城市野生文化的一部分，很生动", "想在上面再加一笔更荒谬的图案"]],
      ["在与他人交流时，你通常更倾向于？", ["条理清晰，直奔主题", "照顾情绪，更在意彼此的感受", "喜欢听对方分享过去真实的经历", "经常抛出冷笑话或非常跳脱的观点"]],
      ["凭直觉选一个最吸引你的形状？", ["一个点", "没有固定边界的云彩", "带有粗糙边缘的岩石", "极具攻击性的三角形"]],
      ["夜深人静时，你脑海里最常浮现的是？", ["对明天待办事项的系统梳理", "一段旋律、一句诗或某种模糊的情绪", "回忆过去某个无法倒流的瞬间", "幻想一个荒诞离奇的末日反转剧情"]],
      ["你最欣赏的故事结尾方式是？", ["一切谜题解开，形成完美的逻辑闭环", "留有余韵，男女主相视一笑的留白", "充满现实主义的无奈与妥协，很真实", "突然的惊天大反转，让人倒吸一口凉气"]],
      ["如果你有收藏的习惯，你会收集什么？", ["按照系列和编号排好的同类物品", "别人写给自己的信件或有纪念意义的票根", "在各个地方捡来的石头、落叶或旧物件", "外星人手办、怪异面具等冷门奇葩物品"]],
      ["哪种动物的特质更符合你的自我认知？", ["严谨独居、有强领地意识的猫", "自由飞翔、随季节感性迁徙的候鸟", "在原野上奔跑的野马或经历沧桑的老象", "生存在深海里神秘的未知生物"]],
      ["在你的内心深处，艺术到底是什么？", ["一种建立秩序和规律的视觉语言", "一种宣泄情感和治愈内心的出口", "一种对抗时间遗忘的记录方式", "一种打破世俗常识的有趣武器"]]
    ];

    let current = 0;
    let score = {};
    let locked = false;
    Object.keys(personalities).forEach(k => score[k] = 0);

    window.startTest = function() {
      document.getElementById("home").style.display = "none";
      document.getElementById("quiz").style.display = "block";
      render();
    };

    function render() {
      document.getElementById("progress").innerText = `${current + 1}/${questions.length}`;
      document.getElementById("question").innerText = questions[current][0];

      let html = "";
      ["A", "B", "C", "D"].forEach((k, i) => {
        html += `<div class="option" onclick="window.selectOption('${k}', this)">${k}. ${questions[current][1][i]}</div>`;
      });
      document.getElementById("options").innerHTML = html;
    }

    window.selectOption = function(k, el) {
      if (locked) return;
      locked = true;

      document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
      el.classList.add('active');

      setTimeout(() => {
        // 1. 群组普调：给大类加分，奠定合理的副人格风格
        groupMap[k].forEach(p => score[p] += 1);
        
        // 2. 语义暴击：根据这道题的精准题意，给对应的具体人格额外加 2 分
        const optionIndex = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 }[k];
        let specificTrait = preciseMap[current][optionIndex];
        score[specificTrait] += 2; 

        current++;
        locked = false;

        if (current < questions.length) {
          render();
        } else {
          showResult();
        }
      }, 180);
    };

   function showResult() {
      document.getElementById("quiz").style.display = "none";
      const sorted = Object.entries(score).sort((a, b) => b[1] - a[1]);

      const main = personalities[sorted[0][0]];
      const second = personalities[sorted[1][0]];

      const formattedAnalysis = main.analysis.replace(/\n/g, '<br>');

      const resultDiv = document.getElementById("result");
      resultDiv.style.display = "block";
      resultDiv.innerHTML = `
        <div class="card">
          <div class="result-title">
            <div class="result-sub">🎨 你的艺术人格是：</div>
            <div class="result-main">${main.name}</div>
          </div>
          <p style="font-size:1.1rem; margin-top:-5px;">${main.desc}</p>
          <img src="${main.img}" alt="${main.name}">
          
          <p><b>艺术风格</b>　${main.style}</p>
          <p style="line-height:1.6;">${formattedAnalysis}</p>
          
          <hr>
          
          <p style="font-size:1rem; opacity:0.9; margin-bottom: 24px;">✨ 你同时也带有 <strong>「${second.name}」</strong> 副人格特质</p>

          <!-- ===== 新增：二维码分享区域 ===== -->
          <div style="display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-top: 1px dashed #ddd;">
            <div style="width: 120px; height: 120px; border: 1px solid #000; padding: 8px; background: #fff; position: relative;">
               <!-- 这里替换成你的实际二维码图片地址 -->
               <img src="images/qrcode.jpg" style="width: 100%; margin: 0; border-radius: 0;" alt="二维码">
               <!-- 装饰性四个角，增加机能感 -->
               <div style="position: absolute; top: -2px; left: -2px; width: 10px; height: 10px; border-top: 2px solid #000; border-left: 2px solid #000;"></div>
               <div style="position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; border-top: 2px solid #000; border-right: 2px solid #000;"></div>
               <div style="position: absolute; bottom: -2px; left: -2px; width: 10px; height: 10px; border-bottom: 2px solid #000; border-left: 2px solid #000;"></div>
               <div style="position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; border-bottom: 2px solid #000; border-right: 2px solid #000;"></div>
            </div>
            <p style="font-size: 12px; color: #999; margin-top: 12px; letter-spacing: 2px;">解锁我的艺术人格</p>
          </div>
        </div>

        <div class="btn" onclick="location.reload()">再测一次</div>
        <div style="height: 40px;"></div> <!-- 留白 -->
      `;
    }

    window.render = render;
  })();
</script>
